# Deploy Next.js on Netlify + external Postgres (Neon / Supabase / Render).
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npx prisma generate && npx prisma migrate deploy && next build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Required env vars (Netlify UI → Environment variables):
# DATABASE_URL
# AUTH_SECRET
# AUTH_URL                 = https://your-site.netlify.app
# NEXTAUTH_URL             = https://your-site.netlify.app
# ADMIN_EMAIL / ADMIN_PASSWORD  (for one-time seeding)
# RAZORPAY_KEY_ID
# RAZORPAY_KEY_SECRET
# NEXT_PUBLIC_RAZORPAY_KEY_ID
# ALLOW_DEMO_PAYMENTS=false
